#
# Merges upstream MacroQuest into master and pushes.
#
# Per target (selects the upstream ref to merge):
#   live / test  -> merge upstream/master into master.
#   emu-rof2     -> sync redguides/eqlib from upstream mq first, then merge
#                   upstream rel-emu-rof2 into master.

name: OV Sync With Upstream

on:
  workflow_dispatch:
    inputs:
      target:
        description: Client target to update
        required: true
        type: choice
        options:
          - emu-rof2
          - live
          - test
  repository_dispatch:
    types: [sync-upstream-emu-rof2]

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'redguides/openvanilla'
    runs-on: [fast, self-hosted, Windows, X64]
    env:
      REPO_DIR: C:\actions-runner\repos\openvanilla
      RG_SYNC_PAT: ${{ secrets.RG_SYNC_PAT }}
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'emu-rof2' }}
    steps:
      - name: Sync redguides/eqlib from upstream (emu only, and wait)
        if: startsWith(env.TARGET, 'emu')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RG_SYNC_PAT }}
        run: |
          $before = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          gh workflow run sync_upstream.yaml --repo redguides/eqlib --ref live
          if ($LASTEXITCODE -ne 0) { throw "Failed to dispatch eqlib sync workflow" }

          $runId = $null
          for ($i = 0; $i -lt 12 -and -not $runId; $i++) {
            Start-Sleep -Seconds 5
            $runId = gh run list --repo redguides/eqlib --workflow sync_upstream.yaml `
              --created ">=$before" --limit 1 --json databaseId --jq '.[0].databaseId'
          }
          if (-not $runId) { throw "eqlib sync run never appeared on redguides/eqlib" }

          gh run watch $runId --repo redguides/eqlib --exit-status
          if ($LASTEXITCODE -ne 0) { throw "eqlib sync failed (run $runId). Not merging MQ until eqlib is current." }

      - name: Prepare working copy
        shell: pwsh
        run: |
          function Invoke-Git {
            git @args
            if ($LASTEXITCODE -ne 0) { throw "git $args failed (exit $LASTEXITCODE)" }
          }

          $auth = "https://x-access-token:$env:RG_SYNC_PAT@github.com/redguides/openvanilla.git"

          if (-not (Test-Path $env:REPO_DIR)) {
            Invoke-Git clone $auth $env:REPO_DIR
          }
          Set-Location $env:REPO_DIR

          Invoke-Git config user.name "github-actions[bot]"
          Invoke-Git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Don't clobber a manual merge someone is resolving on the runner.
          if (Test-Path .git/MERGE_HEAD) {
            throw "A merge is already in progress in $env:REPO_DIR. Resolve and push it (or 'git merge --abort'), then re-run."
          }

          Invoke-Git checkout master
          Invoke-Git fetch origin
          Invoke-Git reset --hard origin/master
          Invoke-Git clean -ffdx

          # The eqlib submodule must exist locally with current commits.
          Invoke-Git submodule update --init src/eqlib
          Invoke-Git -C src/eqlib fetch origin

      - name: Merge macroquest upstream
        shell: pwsh
        run: |
          function Invoke-Git {
            git @args
            if ($LASTEXITCODE -ne 0) { throw "git $args failed (exit $LASTEXITCODE)" }
          }

          $auth = "https://x-access-token:$env:RG_SYNC_PAT@github.com/redguides/openvanilla.git"
          # emu targets track a release tag; live/test track upstream master.
          $mergeRef = if ($env:TARGET -like 'emu*') { "rel-$env:TARGET" } else { 'upstream/master' }
          Set-Location $env:REPO_DIR

          git remote add upstream https://github.com/macroquest/macroquest.git 2>$null
          Invoke-Git fetch upstream --tags --force

          Write-Host "Merging $mergeRef into master..."
          git merge $mergeRef --no-edit
          if ($LASTEXITCODE -ne 0) {
            if (-not (Test-Path .git/MERGE_HEAD)) {
              throw "git merge failed before starting (not a conflict). Check the log above."
            }

            $unmerged = @(git diff --name-only --diff-filter=U)

            if ($unmerged -contains 'src/eqlib') {
              # Expected gitlink conflict. master tracks the live eqlib pointer;
              # each build re-resolves eqlib to its own branch tip at build time,
              # so resolve straight to redguides/eqlib live head here.
              $want = (git -C src/eqlib rev-parse "origin/live").Trim()
              if ($LASTEXITCODE -ne 0) { throw "eqlib branch 'live' not found in redguides/eqlib" }
              Invoke-Git -C src/eqlib checkout $want
              Invoke-Git add src/eqlib
              $unmerged = @(git diff --name-only --diff-filter=U)
            }

            if ($unmerged.Count -gt 0) {
              Write-Host "::error::Merge conflicts require manual resolution on the runner ($env:REPO_DIR):"
              $unmerged | ForEach-Object { Write-Host "::error::  $_" }
              Write-Host "Resolve them there (rerere will record it), 'git commit', 'git push origin master', then re-run this workflow."
              exit 1
            }

            # Everything resolved (eqlib and/or rerere replays) -- finish the merge.
            Invoke-Git commit --no-edit
          }

          Invoke-Git push $auth master
